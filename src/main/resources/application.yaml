spring:
  application:
    name: SpringSecurityProject

  # ---------------------------------------------------------------
  # PRIMARY DataSource — MySQL
  # Database: secure_vault
  # ---------------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/secure_vault
    username: root
    password: Ratanlord@1409
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    open-in-view: false
    # NOTE: hibernate.ddl-auto intentionally NOT set here.
    # Managed as "none" in JpaConfig.java to prevent MySQL-dialect DDL
    # (engine=InnoDB) from executing against PostgreSQL when MySQL is down.

  security:
    user:
      name: Ratnakar
      password: Ratanlord@1409

# ---------------------------------------------------------------
# FAILOVER DataSource — PostgreSQL
# Database : VaultStorage
# Schema   : SecureVault
#
# WHY options=-c search_path="SecureVault" instead of currentSchema=SecureVault:
#   PostgreSQL schema names are case-sensitive when created with double quotes.
#   Our schema was created as CREATE SCHEMA "SecureVault" (mixed case).
#   currentSchema=SecureVault gets treated as lowercase "securevault" by the
#   PostgreSQL JDBC driver internally, so it never matches "SecureVault".
#   Using options=-c search_path="SecureVault" sends a raw SET search_path
#   command to PostgreSQL at connection time, preserving exact casing.
# ---------------------------------------------------------------
app:
  datasource:
    postgresql:
      url: jdbc:postgresql://localhost:5432/VaultStorage
      username: postgres
      password: Ratanlord@1409
      driver-class-name: org.postgresql.Driver

# Server configuration
server:
  port: 8091   # Application will run on port 8091

  servlet:
    session:
      cookie:
        # SameSite attribute controls when browser sends the session cookie (JSESSIONID)

        # STRICT:
        # Cookie is sent ONLY when request originates from the same site.
        # It will NOT be sent for:
        # - Cross-site links
        # - External redirects
        # - Requests from other domains
        # Provides highest CSRF protection.
        same-site: STRICT

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE
    com:
      ratnakar:
        security:
          config: DEBUG